name: ipso Publish

on:
  push:
    branches: [main]
    tags: ["ipso/v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ipso/.python-version

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release -o dist/ --find-interpreter
          working-directory: ipso

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: ipso/dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -o dist/
          working-directory: ipso

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ipso/dist/*.tar.gz

  e2e-wheel:
    name: E2E wheel test (${{ matrix.target }})
    needs: [build-wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ipso/.python-version

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/

      - name: Run e2e test (Unix)
        if: runner.os != 'Windows'
        run: bash tests/test_wheel_e2e.sh dist/*.whl

      - name: Run e2e test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem dist/*.whl).FullName
          python -m venv test-venv
          test-venv\Scripts\Activate.ps1
          pip install $wheel
          ipso --help
          python -c "import ipso; print(ipso.__version__)"
          deactivate

  publish:
    needs: [build-wheels, build-sdist, e2e-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/ipso/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
