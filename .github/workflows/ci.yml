name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ""

      - name: Build
        run: make build

      - name: Lint
        run: make lint

  python-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nota-bene

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: nota-bene/.python-version

      - name: Install dependencies
        run: make sync-locked

      - name: Run tests
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            nota-bene/coverage.xml
            nota-bene/htmlcov/

  python-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nota-bene

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: nota-bene/.python-version

      - name: Install dependencies
        run: make sync-locked

      - name: Lint, format, and type-check
        run: make all

  coverage-comment:
    needs: python-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: nota-bene

      - name: Post coverage comment
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: nota-bene/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
