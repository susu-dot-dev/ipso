name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: make build

      - name: Lint
        run: make lint

  test-rs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Rust integration tests
        run: make test

  test-nb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: nota-bene/.python-version

      - name: Run tests
        run: make -C nota-bene test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-nb
          path: |
            nota-bene/coverage.xml
            nota-bene/htmlcov/

  test-pnb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pytest-nota-bene/.python-version

      - name: Install nota-bene (builds CLI from source)
        run: uv pip install --system ./nota-bene/

      - name: Run tests
        run: make -C pytest-nota-bene test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-pnb
          path: |
            pytest-nota-bene/coverage.xml
            pytest-nota-bene/htmlcov/

  lint-nb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: nota-bene/.python-version

      - name: Lint, format, and type-check
        run: make -C nota-bene all

  lint-pnb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pytest-nota-bene/.python-version

      - name: Lint, format, and type-check
        run: make -C pytest-nota-bene all

  coverage-comment:
    needs: [test-nb, test-pnb]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Download nota-bene coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-nb
          path: nota-bene

      - name: Post coverage comment
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: nota-bene/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
