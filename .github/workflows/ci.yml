name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: make build

      - name: Lint
        run: make lint

  test-rs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Rust integration tests
        run: make test

  test-ipso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ipso/.python-version

      - name: Run tests
        run: make -C ipso test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-nb
          path: |
            ipso/coverage.xml
            ipso/htmlcov/

  test-pipso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pytest-ipso/.python-version

      - name: Install ipso (builds CLI from source)
        run: uv pip install --system ./ipso/

      - name: Run tests
        run: make -C pytest-ipso test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-pnb
          path: |
            pytest-ipso/coverage.xml
            pytest-ipso/htmlcov/

  lint-ipso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ipso/.python-version

      - name: Lint, format, and type-check
        run: make -C ipso all

  lint-pipso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pytest-ipso/.python-version

      - name: Lint, format, and type-check
        run: make -C pytest-ipso all

  coverage-comment:
    needs: [test-ipso, test-pipso]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Download ipso coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-nb
          path: ipso

      - name: Post coverage comment
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: ipso/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
